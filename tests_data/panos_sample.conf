set deviceconfig system hostname PA-TEST
set deviceconfig system ip-address 10.0.0.1
set address SRV-WEB ip-netmask 10.1.10.5/32
set address DMZ-NET ip-netmask 10.1.20.0/24
set address EXT-HOST fqdn www.example.com
set address-group GRP-WEB static [ SRV-WEB DMZ-NET ]
set service SVC-HTTPS protocol tcp port 8443
set service SVC-DNS protocol udp port 53
set service-group GRP-SVC members [ SVC-HTTPS SVC-DNS ]
set zone trust network layer3 [ ethernet1/1 ethernet1/2 ]
set zone untrust network layer3 [ ethernet1/3 ]
set rulebase security rules allow-web from trust
set rulebase security rules allow-web to untrust
set rulebase security rules allow-web source SRV-WEB
set rulebase security rules allow-web destination any
set rulebase security rules allow-web application web-browsing
set rulebase security rules allow-web service SVC-HTTPS
set rulebase security rules allow-web action allow
set rulebase security rules deny-all from any
set rulebase security rules deny-all to any
set rulebase security rules deny-all source any
set rulebase security rules deny-all destination any
set rulebase security rules deny-all application any
set rulebase security rules deny-all service any
set rulebase security rules deny-all action deny
set rulebase nat rules snat-out from trust
set rulebase nat rules snat-out to untrust
set rulebase nat rules snat-out source DMZ-NET
set rulebase nat rules snat-out destination any
set rulebase nat rules snat-out service any
set rulebase nat rules snat-out source-translation dynamic-ip-and-port translated-address ethernet1/3
set network ike gateway GW-SITE2 peer-address ip 198.51.100.1
set network ike gateway GW-SITE2 local-address interface ethernet1/3
set network tunnel ipsec TUN-SITE2 auto-key ike-gateway GW-SITE2
set network tunnel ipsec TUN-SITE2 tunnel-interface tunnel.1
set mgt-config users admin permissions role-based superuser yes
set mgt-config users auditor permissions role-based custom profile read-only
set shared authentication-profile CORP-AUTH method radius
set shared server-profile radius RAD-1 server RAD-PRIMARY address 10.0.0.50
set shared server-profile ldap LDAP-1 server LDAP-PRIMARY address 10.0.0.60
