services:
  sentinelnet:
    image: sentinelnet:latest
    build: .
    container_name: sentinelnet
    ports:
      - "8765:8765"
    volumes:
      # Monta solo la cartella dei dati persistenti (db di autenticazione, credenziali degli apparati, chiavi crittografiche, backup)
      # Questo consente di distribuire ed eseguire l'applicazione come immagine standalone pre-compilata da Docker Hub
      # senza sovrascrivere o aver bisogno del codice sorgente Python locale.
      - ./data:/app/data
    environment:
      # Forza l'applicazione a salvare database, chiavi e backup all'interno della directory del volume condiviso
      - SENTINELNET_DATA_DIR=/app/data
      - SENTINELNET_HOST=0.0.0.0
      - SENTINELNET_PORT=8765
      - SENTINELNET_NO_BROWSER=true
      # - SENTINELNET_MASTER_KEY=chiave_segreta_fernet_personalizzata
      # - SENTINELNET_JWT_SECRET=chiave_segreta_jwt_personalizzata
      # - SENTINELNET_ADMIN_USER=Admin
      # - SENTINELNET_ADMIN_PASS=admin
      # - SENTINELNET_ADMIN_SECRET=admin
      # TLS nativo opzionale (vedi docs/HARDENING.md). Percorsi relativi a SENTINELNET_DATA_DIR.
      # - SENTINELNET_SSL_CERTFILE=certs/server.crt
      # - SENTINELNET_SSL_KEYFILE=certs/server.key
    restart: unless-stopped

  # Reverse proxy consigliato per l'esposizione del pannello (docs/HARDENING.md).
  # Decommentare e fornire ./proxy/Caddyfile con TLS + security header.
  # proxy:
  #   image: caddy:2
  #   ports:
  #     - "443:443"
