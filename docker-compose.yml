services:
  sentinelnet:
    build: .
    container_name: sentinelnet
    ports:
      - "8765:8765"
    volumes:
      # Monta la cartella corrente per la massima facilità d'uso: tutte le configurazioni, i backup dei dispositivi
      # e i database locali (users.json, network_hosts.csv, ecc.) persistono direttamente sul tuo host.
      # Questo permette di alternare l'esecuzione nativa e quella Docker senza perdere dati.
      - .:/app
    environment:
      # (Opzionale) Definisci le chiavi crittografiche o le credenziali di default.
      # Se non specificate, verranno generate automaticamente e persistite sul file system locale.
      - SENTINELNET_HOST=0.0.0.0
      - SENTINELNET_PORT=8765
      - SENTINELNET_NO_BROWSER=true
      # - SENTINELNET_MASTER_KEY=chiave_segreta_fernet_personalizzata
      # - SENTINELNET_JWT_SECRET=chiave_segreta_jwt_personalizzata
      # - SENTINELNET_ADMIN_USER=Admin
      # - SENTINELNET_ADMIN_PASS=admin
      # - SENTINELNET_ADMIN_SECRET=admin
    restart: unless-stopped
